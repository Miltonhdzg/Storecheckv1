<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Store Check</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />

  <style>
    :root {
      --bg:#F8FAFC;
      --card:#FFFFFF;
      --primary:#3B82F6;
      --primary-hover:#2563EB;
      --secondary:#60A5FA;
      --success:#22C55E;
      --warning:#F59E0B;
      --error:#EF4444;
      --text:#1F2937;
      --muted:#6B7280;
      --border:#E5E7EB;
    }

    *{ box-sizing:border-box }
    html,body{ min-height:100% }
    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Cantarell,Noto Sans,Helvetica,Arial;
      background:var(--bg);
      color:var(--text);
      line-height:1.45;
    }

    .container{
      max-width:1080px;
      margin:20px auto;
      padding:0 16px;
    }

    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:8px;
      box-shadow:0 18px 45px rgba(31,41,55,.08);
      overflow:hidden;
      min-height:calc(100vh - 40px);
      display:flex;
      flex-direction:column;
    }

    header{
      padding:20px 22px 16px;
      border-top:4px solid var(--primary);
      border-bottom:1px solid var(--border);
      background:var(--card);
    }
    header h1{
      margin:0 0 4px;
      font-size:24px;
      font-weight:700;
      color:var(--text);
    }
    header p{
      margin:0;
      color:var(--muted);
      font-size:14px;
    }

    form{
      padding:18px 22px 20px;
      flex:1;
      display:flex;
      flex-direction:column;
      gap:16px;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(12,1fr);
      gap:14px;
    }
    .col-4{ grid-column:span 4 }
    .col-6{ grid-column:span 6 }
    .col-12{ grid-column:span 12 }

    label{
      display:block;
      margin:0 0 6px;
      color:var(--text);
      font-size:13px;
      font-weight:600;
    }

    select,
    input[type=text],
    textarea{
      width:100%;
      padding:10px 12px;
      border:1px solid var(--border);
      border-radius:8px;
      background:var(--card);
      color:var(--text);
      outline:none;
      font:inherit;
      transition:border-color .15s ease, box-shadow .15s ease, background-color .15s ease;
    }

    select:hover,
    input[type=text]:hover,
    textarea:hover{
      border-color:var(--secondary);
    }

    select:focus,
    input[type=text]:focus,
    textarea:focus{
      border-color:var(--primary);
      box-shadow:0 0 0 3px rgba(59,130,246,.16);
    }

    input::placeholder{ color:var(--muted) }

    textarea{
      resize:none;
      line-height:1.3;
      white-space:normal;
      overflow-wrap:anywhere;
    }

    textarea[readonly]{
      background:var(--bg);
      cursor:default;
    }

    table{
      width:100%;
      border-collapse:separate;
      border-spacing:0;
      table-layout:fixed;
    }

    thead th{
      position:sticky;
      top:0;
      z-index:1;
      background:var(--bg);
    }

    th,td{
      border-bottom:1px solid var(--border);
      padding:10px 8px;
      text-align:left;
      vertical-align:top;
    }
    th{
      color:var(--muted);
      font-weight:700;
      font-size:12px;
      text-transform:uppercase;
    }

    tbody tr:nth-child(even){ background:#FFFFFF }
    tbody tr:nth-child(odd){ background:var(--bg) }
    tbody tr:hover{ background:rgba(96,165,250,.12) }

    #tablaProductos th:nth-child(1),
    #tablaProductos td:nth-child(1){ width:55% }

    #tablaProductos th:nth-child(2),
    #tablaProductos td:nth-child(2){ width:25% }

    #tablaProductos th:nth-child(3),
    #tablaProductos td:nth-child(3){ width:20% }

    /* Producto: optimizado para nombres largos
       - usamos truncado multilinea (2 líneas) con ellipsis
       - diseño compacto y sin bordes extra para ahorrar espacio */
    #tablaProductos .producto{
      padding:10px 12px;
      border-radius:8px;
      background:transparent;
      font-size:16px;
      line-height:1.25;
      margin:0;
      max-height:2.6em; /* ~2 líneas */
      overflow:hidden;
      display:-webkit-box;
      -webkit-line-clamp:2;
      -webkit-box-orient:vertical;
      text-overflow:ellipsis;
      white-space:normal;
      word-break:break-word;
    }

    .productos-section{
      display:flex;
      flex-direction:column;
      gap:6px;
      flex:1;
      min-height:0;
    }

    .tabla-wrapper{
      margin-top:6px;
      border:1px solid var(--border);
      border-radius:8px;
      overflow:auto;
      flex:1;
      min-height:0;
      background:var(--card);
    }

    .btn{
      appearance:none;
      border:1px solid var(--border);
      background:var(--card);
      color:var(--text);
      padding:10px 16px;
      border-radius:8px;
      cursor:pointer;
      font-weight:700;
      font:inherit;
      min-height:42px;
      transition:background-color .15s ease, border-color .15s ease, color .15s ease, box-shadow .15s ease;
    }
    .btn:hover{
      border-color:var(--secondary);
      color:var(--primary-hover);
    }
    .btn:disabled{
      opacity:.65;
      cursor:not-allowed;
    }
    .btn:focus-visible{
      outline:none;
      box-shadow:0 0 0 3px rgba(59,130,246,.18);
    }

    .btn-primary{
      background:var(--primary);
      color:#FFFFFF;
      border-color:var(--primary);
    }
    .btn-primary:hover{
      background:var(--primary-hover);
      border-color:var(--primary-hover);
      color:#FFFFFF;
    }

    .footer{
      padding:14px 22px 18px;
      display:flex;
      gap:14px;
      border-top:1px solid var(--border);
      align-items:center;
      justify-content:space-between;
      flex-shrink:0;
      background:var(--card);
    }

    .footer > div:first-child{
      min-width:0;
      flex:1;
    }

    .hint{
      color:var(--muted);
      font-size:12px;
      margin-top:0;
    }
    .errors,
    .success{
      display:none;
      width:100%;
      padding:10px 12px;
      border-radius:8px;
      font-size:13px;
      font-weight:600;
    }
    .errors{
      color:var(--error);
      background:rgba(239,68,68,.08);
      border:1px solid rgba(239,68,68,.22);
    }
    .success{
      color:var(--success);
      background:rgba(34,197,94,.10);
      border:1px solid rgba(34,197,94,.24);
    }

    body.modal-open{ overflow:hidden }

    .modal-backdrop{
      position:fixed;
      inset:0;
      z-index:20;
      display:grid;
      place-items:center;
      padding:20px;
      background:rgba(31,41,55,.36);
      backdrop-filter:blur(2px);
    }
    .modal-backdrop[hidden]{ display:none }

    .modal{
      width:min(420px,100%);
      background:var(--card);
      border:1px solid var(--border);
      border-radius:8px;
      box-shadow:0 24px 60px rgba(31,41,55,.22);
      padding:18px;
    }

    .modal-header{
      display:flex;
      gap:12px;
      align-items:flex-start;
      margin-bottom:16px;
    }

    .modal-status-icon{
      width:38px;
      height:38px;
      border-radius:50%;
      display:grid;
      place-items:center;
      flex:0 0 auto;
      background:rgba(59,130,246,.12);
    }
    .modal-status-icon::before{
      content:"";
      width:14px;
      height:14px;
      border-radius:50%;
      background:var(--primary);
      animation:pulse 1s ease-in-out infinite;
    }

    .modal h2{
      margin:0 0 4px;
      color:var(--text);
      font-size:18px;
      line-height:1.2;
    }

    .modal p{
      margin:0;
      color:var(--muted);
      font-size:13px;
    }

    .progress-track{
      width:100%;
      height:10px;
      overflow:hidden;
      border-radius:999px;
      background:var(--border);
    }

    .progress-fill{
      width:0%;
      height:100%;
      border-radius:inherit;
      background:var(--primary);
      transition:width .25s ease, background-color .15s ease;
    }

    .modal-progress-meta{
      display:flex;
      justify-content:space-between;
      gap:12px;
      margin-top:8px;
      color:var(--muted);
      font-size:12px;
      font-weight:600;
    }

    .modal-actions{
      display:flex;
      justify-content:flex-end;
      margin-top:16px;
    }

    .modal.is-success .modal-status-icon{ background:rgba(34,197,94,.12) }
    .modal.is-success .modal-status-icon::before,
    .modal.is-success .progress-fill{
      background:var(--success);
      animation:none;
    }

    .modal.is-error .modal-status-icon{ background:rgba(239,68,68,.12) }
    .modal.is-error .modal-status-icon::before,
    .modal.is-error .progress-fill{
      background:var(--error);
      animation:none;
    }

    @keyframes pulse{
      0%,100%{ transform:scale(.85); opacity:.65 }
      50%{ transform:scale(1.1); opacity:1 }
    }

    @media(max-width:820px){
      .container{
        max-width:100%;
        margin:0;
        padding:0;
      }
      .card{
        min-height:100vh;
        border-radius:0;
        border-left:0;
        border-right:0;
        box-shadow:none;
      }

      header{ padding:16px 14px 12px }
      header h1{ font-size:21px }
      header p{ font-size:13px }

      form{
        padding:14px;
        gap:14px;
      }

      .grid{ gap:10px }
      .col-4,
      .col-6{ grid-column:span 12 }

      label{ font-size:12px }

      select,
      input[type=text],
      textarea{
        padding:9px 10px;
        font-size:14px;
      }

      th,td{
        padding:8px 5px;
        font-size:12px;
      }

      #tablaProductos th:nth-child(1),
      #tablaProductos td:nth-child(1){ width:52% }

      #tablaProductos th:nth-child(2),
      #tablaProductos td:nth-child(2){ width:28% }

      #tablaProductos th:nth-child(3),
      #tablaProductos td:nth-child(3){ width:20% }

      /* en móvil reduzco alturas y tamaños para aprovechar espacio */
      #tablaProductos .producto{
        font-size:15px;
        max-height:2.8em;
      }

      .footer{
        align-items:stretch;
        flex-direction:column;
        padding:12px 14px 14px;
      }

      .footer .btn{
        flex:1;
        padding:9px 10px;
        font-size:14px;
      }

      .modal-backdrop{ padding:14px }
      .modal{ padding:16px }
    }

  </style>
</head>

<body>
  <div class="container">
    <div class="card">

      <header>
        <h1>Store Check</h1>
        <p>Elige Cadena y Estado. Coloca el precio OFERTA.</p>
      </header>

      <form id="formPrecios" autocomplete="off">

        <!-- === SELECTORES === -->
        <section class="grid">
          <div class="col-4">
            <label for="cadena">Cadena</label>
            <select id="cadena" name="cadena" required>
              <option value="" selected disabled>Selecciona...</option>
            </select>
          </div>

          <div class="col-4">
            <label for="familia">Familia</label>
            <select id="familia" name="familia">
              <option value="" selected>Todas</option>
            </select>
          </div>

          <div class="col-4">
            <label for="estado">Estado</label>
            <select id="estado" name="estado" required>
              <option value="" selected disabled>Selecciona...</option>
            </select>
          </div>
        </section>

        <!-- === PRODUCTOS === -->
        <section class="productos-section">
          <label style="margin:0;">Productos</label>
          <div class="hint">
            Lista fija por Cadena. Columnas: <b>Producto</b>, <b>Promoción</b> y <b>Precio</b> (2 decimales).
          </div>

          <div class="tabla-wrapper">
            <table id="tablaProductos">
              <thead>
                <tr>
                  <th style="width:55%;">Producto</th>
                  <th style="width:25%;">Promoción</th>
                  <th style="width:20%;">Precio</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>
        </section>

        <!-- === FOOTER === -->
        <div class="footer">
          <div>
            <div class="errors" id="errors"></div>
            <div class="success" id="success"></div>
          </div>

          <div style="display:flex;gap:10px;">
            <button class="btn" type="button" id="btnLimpiar">Limpiar</button>
            <button class="btn btn-primary" type="submit" id="btnEnviar">Enviar</button>
          </div>
        </div>

      </form>
    </div>
  </div>

  <div class="modal-backdrop" id="modalEnvio" hidden aria-hidden="true">
    <div class="modal" id="modalEnvioCard" role="dialog" aria-modal="true" aria-labelledby="modalEnvioTitulo" aria-describedby="modalEnvioDetalle">
      <div class="modal-header">
        <span class="modal-status-icon" aria-hidden="true"></span>
        <div>
          <h2 id="modalEnvioTitulo">Enviando precios</h2>
          <p id="modalEnvioDetalle">Preparando datos.</p>
        </div>
      </div>

      <div class="progress-track" id="modalProgreso" role="progressbar" aria-label="Progreso del envio" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
        <div class="progress-fill" id="modalBarra"></div>
      </div>

      <div class="modal-progress-meta">
        <span id="modalEtapa">Preparando</span>
        <span id="modalPorcentaje">0%</span>
      </div>

      <div class="modal-actions">
        <button class="btn" type="button" id="modalCerrar" hidden>Cerrar</button>
      </div>
    </div>
  </div>

  <!-- === TEMPLATE DE FILA === -->
  <template id="tplFila">
    <tr>
      <td><div class="producto" aria-hidden="false"></div></td>
      <td>
        <select class="promo">
          <option value="Sin Oferta" selected>Sin Oferta</option>
          <option value="2x1">2x1</option>
          <option value="3x2">3x2</option>
          <option value="5x3">5x3</option>          
        </select>
      </td>
      <td><input type="text" class="precio" placeholder="0.00" inputmode="decimal" /></td>
    </tr>
  </template>

  <!-- === JS === -->
  <script>

    const ESTADOS_MX = [
      "Aguascalientes","Baja California","Baja California Sur","Campeche","Chiapas","Chihuahua","Ciudad de México","Coahuila","Colima","Durango","Estado de México","Guanajuato","Guerrero","Hidalgo","Jalisco","Michoacán","Morelos","Nayarit","Nuevo León","Oaxaca","Puebla","Querétaro","Quintana Roo","San Luis Potosí","Sinaloa","Sonora","Tabasco","Tamaulipas","Tlaxcala","Veracruz","Yucatán","Zacatecas"
    ];

    const CATALOGO_URL = 'https://script.google.com/macros/s/AKfycbz0nlveTzDA5sAn9O6ToIit-T_maUhwAyoyhN-XsKeTKC5gLFFVeIghs00aGHMqcbyXKA/exec?action=catalogo';
    let PRODUCTOS_POR_CADENA = {};
    const PROMOCIONES = ['Oferta', '2x1', '3x2', '5x3'];
    const LEGACY_CHAR_MAP = {
      0x87: 'á',
      0x8E: 'é',
      0x97: 'ó',
      0x9C: 'ú'
    };

    function limpiarTexto(valor){
      return (valor ?? '')
        .toString()
        .replace(/\s+/g, ' ')
        .trim();
    }

    function capitalizarEtiqueta(valor){
      return limpiarTexto(valor)
        .toLocaleLowerCase('es-MX')
        .split(' ')
        .map(palabra => palabra
          ? palabra.charAt(0).toLocaleUpperCase('es-MX') + palabra.slice(1)
          : ''
        )
        .join(' ');
    }

    function claveCanonica(valor){
      return limpiarTexto(valor)
        .toLocaleLowerCase('es-MX')
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '');
    }

    function preferirEtiqueta(actual, siguiente){
      if(!actual) return siguiente;
      const actualAscii = /^[\x00-\x7F]*$/.test(actual);
      const siguienteAscii = /^[\x00-\x7F]*$/.test(siguiente);
      if(actualAscii && !siguienteAscii) return siguiente;
      return actual;
    }

    function normalizarDatos(){
      Object.keys(PRODUCTOS_POR_CADENA).forEach(cadena=>{
        const familiasCanonicas = new Map();
        PRODUCTOS_POR_CADENA[cadena] = (PRODUCTOS_POR_CADENA[cadena]||[]).map(item=>{
          const segmentoOriginal = item.Segmento ?? item.segmento ?? item.Familia ?? item.familia ?? '';
          const segmentoLimpio = limpiarTexto(segmentoOriginal);
          const segmentoClave = claveCanonica(segmentoLimpio);
          const segmentoPropuesto = segmentoLimpio ? capitalizarEtiqueta(segmentoLimpio) : '';
          const segmento = segmentoLimpio
            ? preferirEtiqueta(familiasCanonicas.get(segmentoClave), segmentoPropuesto)
            : '';

          if(segmentoClave && !familiasCanonicas.has(segmentoClave)){
            familiasCanonicas.set(segmentoClave, segmento);
          }else if(segmentoClave){
            familiasCanonicas.set(segmentoClave, segmento);
          }

          return {
            producto: limpiarTexto(item.Producto ?? item.producto ?? ''),
            marca: limpiarTexto(item.Marca ?? item.marca ?? ''),
            segmento,
            codigo: limpiarTexto(item['Codigo Producto'] ?? item.codigo ?? item.Codigo ?? '')
          };
        });
      });
    }

    /* === FUNCIONES === */
    function normalizarPrecio(valor){
      if(!valor) return '';
      let v = (valor+'').trim().replace(',', '.').replace(/[^0-9.]/g,'');
      const i = v.indexOf('.');
      if(i!==-1) v = v.slice(0,i+1) + v.slice(i+1).replace(/\./g,'');
      const m = v.match(/^(\d+)(?:\.(\d{0,2}))?$/);
      if(!m){
        const p = v.split('.');
        if(p.length===1) return p[0];
        return p[0]+'.'+p[1].slice(0,2);
      }
      return m[1] + (m[2]!==undefined ? '.'+m[2] : '');
    }

    function formateaDinero(num){
      const n = Number(num);
      if(!isFinite(n)) return '';
      return n.toFixed(2);
    }

    function decodificarTextoMixto(buffer){
      const utf8 = new TextDecoder('utf-8').decode(buffer);
      if(!utf8.includes('\uFFFD')) return utf8;

      const bytes = new Uint8Array(buffer);
      let out = '';

      for(let i=0;i<bytes.length;i++){
        const b0 = bytes[i];

        if(b0 < 0x80){
          out += String.fromCharCode(b0);
          continue;
        }

        const b1 = bytes[i+1];
        const b2 = bytes[i+2];
        const b3 = bytes[i+3];

        const es2 =
          b0 >= 0xC2 && b0 <= 0xDF &&
          b1 >= 0x80 && b1 <= 0xBF;

        const es3 =
          (
            (b0 === 0xE0 && b1 >= 0xA0 && b1 <= 0xBF) ||
            (b0 >= 0xE1 && b0 <= 0xEC && b1 >= 0x80 && b1 <= 0xBF) ||
            (b0 === 0xED && b1 >= 0x80 && b1 <= 0x9F) ||
            (b0 >= 0xEE && b0 <= 0xEF && b1 >= 0x80 && b1 <= 0xBF)
          ) &&
          b2 >= 0x80 && b2 <= 0xBF;

        const es4 =
          (
            (b0 === 0xF0 && b1 >= 0x90 && b1 <= 0xBF) ||
            (b0 >= 0xF1 && b0 <= 0xF3 && b1 >= 0x80 && b1 <= 0xBF) ||
            (b0 === 0xF4 && b1 >= 0x80 && b1 <= 0x8F)
          ) &&
          b2 >= 0x80 && b2 <= 0xBF &&
          b3 >= 0x80 && b3 <= 0xBF;

        if(es2){
          out += new TextDecoder('utf-8').decode(bytes.slice(i, i+2));
          i += 1;
          continue;
        }

        if(es3){
          out += new TextDecoder('utf-8').decode(bytes.slice(i, i+3));
          i += 2;
          continue;
        }

        if(es4){
          out += new TextDecoder('utf-8').decode(bytes.slice(i, i+4));
          i += 3;
          continue;
        }

        if(LEGACY_CHAR_MAP[b0]){
          out += LEGACY_CHAR_MAP[b0];
          continue;
        }

        if(b0 >= 0xA0){
          out += String.fromCharCode(b0);
          continue;
        }

        out += '\uFFFD';
      }

      return out;
    }

    const tablaBody = document.querySelector('#tablaProductos tbody');
    const tpl = document.getElementById('tplFila');
    const selCadena = document.getElementById('cadena');
    const selFamilia = document.getElementById('familia');
    const selEstado = document.getElementById('estado');
    const btnLimpiar = document.getElementById('btnLimpiar');
    const btnEnviar = document.getElementById('btnEnviar');
    const errorsEl = document.getElementById('errors');
    const okEl = document.getElementById('success');
    const modalEnvio = document.getElementById('modalEnvio');
    const modalEnvioCard = document.getElementById('modalEnvioCard');
    const modalDetalle = document.getElementById('modalEnvioDetalle');
    const modalEtapa = document.getElementById('modalEtapa');
    const modalPorcentaje = document.getElementById('modalPorcentaje');
    const modalProgreso = document.getElementById('modalProgreso');
    const modalBarra = document.getElementById('modalBarra');
    const modalCerrar = document.getElementById('modalCerrar');
    const preciosMem = new Map();
    const promosMem = new Map();

    function claveItem(cadena, it){
      const cod = (it.codigo || '').trim();
      if(cod) return `${cadena}::${cod}`;
      return `${cadena}::${it.producto || ''}::${it.marca || ''}`;
    }

    function mostrarMsg(tipo,txt){
      if(tipo==='error'){
        errorsEl.textContent=txt;
        errorsEl.style.display='block';
        okEl.style.display='none';
      } else {
        okEl.textContent=txt;
        okEl.style.display='block';
        errorsEl.style.display='none';
      }
    }

    function esperar(ms){
      return new Promise(resolve=>setTimeout(resolve, ms));
    }

    function setControlesEnvio(desactivado){
      btnLimpiar.disabled = desactivado;
      btnEnviar.disabled = desactivado;
    }

    function actualizarModalEnvio(etapa, detalle, porcentaje){
      const pct = Math.max(0, Math.min(100, Math.round(porcentaje)));
      modalEtapa.textContent = etapa;
      modalDetalle.textContent = detalle;
      modalPorcentaje.textContent = `${pct}%`;
      modalBarra.style.width = `${pct}%`;
      modalProgreso.setAttribute('aria-valuenow', String(pct));
    }

    function abrirModalEnvio(){
      modalEnvioCard.classList.remove('is-success','is-error');
      modalCerrar.hidden = true;
      actualizarModalEnvio('Preparando', 'Validando precios capturados.', 10);
      modalEnvio.hidden = false;
      modalEnvio.setAttribute('aria-hidden','false');
      document.body.classList.add('modal-open');
    }

    function cerrarModalEnvio(){
      modalEnvio.hidden = true;
      modalEnvio.setAttribute('aria-hidden','true');
      document.body.classList.remove('modal-open');
    }

    async function finalizarModalEnvio(tipo, etapa, detalle){
      modalEnvioCard.classList.add(tipo === 'error' ? 'is-error' : 'is-success');
      actualizarModalEnvio(etapa, detalle, 100);
      modalCerrar.hidden = false;
      if(tipo === 'success'){
        await esperar(1200);
        cerrarModalEnvio();
      }
    }

    modalCerrar.addEventListener('click', cerrarModalEnvio);

    function poblarEstados(){
      ESTADOS_MX.forEach(e=>{
        const o=document.createElement('option');
        o.value=e; o.textContent=e;
        selEstado.appendChild(o);
      });
    }

    function poblarCadenas(){
      selCadena.innerHTML = '<option value="" selected disabled>Selecciona...</option>';
      Object.keys(PRODUCTOS_POR_CADENA)
        .sort((a,b)=>a.localeCompare(b))
        .forEach(c=>{
          const o=document.createElement('option');
          o.value=c; o.textContent=c;
          selCadena.appendChild(o);
        });
    }

    function poblarFamilias(cadena){
      selFamilia.innerHTML = '<option value="" selected>Todas</option>';
      if(!cadena) return;
      const set = new Set();
      (PRODUCTOS_POR_CADENA[cadena]||[]).forEach(it=>{
        if(it.segmento) set.add(it.segmento);
      });
      [...set].sort((a,b)=>a.localeCompare(b)).forEach(f=>{
        const o=document.createElement('option');
        o.value=f; o.textContent=f;
        selFamilia.appendChild(o);
      });
    }

    function limpiarTabla(){ tablaBody.innerHTML=''; }

    function cargarTabla(cadena, familia){
      limpiarTabla();
      let items = (PRODUCTOS_POR_CADENA[cadena]||[]).slice();
      if(familia) items = items.filter(it=>it.segmento===familia);

      items.forEach(it=>{
        const node=tpl.content.cloneNode(true);
        node.querySelector('tr').dataset.codigo=it.codigo||'';
        node.querySelector('tr').dataset.marca=it.marca||'';
        node.querySelector('.producto').textContent=it.producto||'';
        let pr=node.querySelector('.precio');
        let promoSel=node.querySelector('.promo');
        const key = claveItem(cadena, it);
        if(preciosMem.has(key)) pr.value = preciosMem.get(key);
        promoSel.value = promosMem.get(key) || PROMOCIONES[0];
        pr.addEventListener('input',e=>{
          const v = normalizarPrecio(e.target.value);
          e.target.value = v;
          if(v) preciosMem.set(key, v);
          else preciosMem.delete(key);
        });
        promoSel.addEventListener('change', e=>{
          promosMem.set(key, e.target.value || PROMOCIONES[0]);
        });
        tablaBody.appendChild(node);
      });
    }

    /* === EVENTOS === */
    selCadena.addEventListener('change',()=>{
      poblarFamilias(selCadena.value);
      cargarTabla(selCadena.value, selFamilia.value);
    });

    selFamilia.addEventListener('change',()=>{
      cargarTabla(selCadena.value, selFamilia.value);
    });

    btnLimpiar.addEventListener('click',()=>{
      document.getElementById('formPrecios').reset();
      poblarFamilias('');
      limpiarTabla();
      preciosMem.clear();
      promosMem.clear();
      mostrarMsg('success','Formulario reiniciado.');
    });
    //////
async function cargarProductosDesdeSheets(){
  try{
    const res = await fetch(CATALOGO_URL, { cache: 'no-store' });
    if(!res.ok) throw new Error('No se pudo leer el catalogo');

    const json = await res.json();
    if(!json.ok) throw new Error(json.error || 'Respuesta invalida del catalogo');

    const rows = Array.isArray(json.rows) ? json.rows : [];
    PRODUCTOS_POR_CADENA = {};

    for (const item of rows) {
      const cadena = limpiarTexto(item['Cadena']);
      const marca = limpiarTexto(item['Marca']);
      const producto = limpiarTexto(item['Producto']);
      const familia = limpiarTexto(item['Familia']);
      const codigo = limpiarTexto(item['Codigo Producto']);

      if (!cadena || !producto) continue;
      if (!PRODUCTOS_POR_CADENA[cadena]) PRODUCTOS_POR_CADENA[cadena] = [];

      PRODUCTOS_POR_CADENA[cadena].push({
        producto,
        marca,
        segmento: familia,
        codigo
      });
    }

    normalizarDatos();
    poblarCadenas();
  }catch(err){
    mostrarMsg('error','No se pudo cargar el catalogo desde Google Sheets.');
  }
}



    /////////////////

    const ENDPOINT = "https://script.google.com/macros/s/AKfycbz0nlveTzDA5sAn9O6ToIit-T_maUhwAyoyhN-XsKeTKC5gLFFVeIghs00aGHMqcbyXKA/exec";
    const API_TOKEN = "10152021"; // el mismo del Apps Script

    poblarEstados();
    cargarProductosDesdeSheets();


    /* === ENVÍO === */
    document.getElementById('formPrecios').addEventListener('submit', async e=>{
      e.preventDefault();
      const cadena=selCadena.value;
      const estado=selEstado.value;
      if(!cadena||!estado)
        return mostrarMsg('error','Selecciona Cadena y Estado.');

      if(!PRODUCTOS_POR_CADENA[cadena] || PRODUCTOS_POR_CADENA[cadena].length===0)
        return mostrarMsg('error','No hay productos configurados para esta Cadena.');

      const filas=[...tablaBody.querySelectorAll('tr')];
      const items=[];

      for(const tr of filas){
        const producto=limpiarTexto(tr.querySelector('.producto').textContent);
        const marca=tr.dataset.marca||'';
        const promo=tr.querySelector('.promo').value || PROMOCIONES[0];
        const codigo=tr.dataset.codigo||'';
        let pr=normalizarPrecio(tr.querySelector('.precio').value.trim());
        if(!pr) continue;
        pr=formateaDinero(pr);
        items.push({prod:producto,producto,marca,promo,codigo,pr});
      }

      if(items.length===0)
        return mostrarMsg('error','Agrega al menos un precio.');

      const familia = selFamilia.value || '';

      const payload = {
        token: API_TOKEN,
        cadena,
        estado,
        familia,
        items
      };

      setControlesEnvio(true);
      abrirModalEnvio();

      try{
        await esperar(250);
        actualizarModalEnvio('Enviando', 'Mandando información al servidor.', 45);

        const ok = navigator.sendBeacon
          ? navigator.sendBeacon(
              ENDPOINT,
              new Blob([JSON.stringify(payload)], { type: 'text/plain;charset=utf-8' })
            )
          : false;

        if(!ok){
          actualizarModalEnvio('Reintentando', 'La primera ruta no respondió. Intentando envío alterno.', 70);
          await fetch(ENDPOINT, {
            method: 'POST',
            mode: 'no-cors',
            keepalive: true,
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify(payload)
          });
        }else{
          actualizarModalEnvio('Solicitud enviada', 'El navegador aceptó el envío.', 78);
          await esperar(300);
        }

        actualizarModalEnvio('Finalizando', 'Limpiando formulario.', 92);
        await esperar(250);
        document.getElementById('formPrecios').reset();
        poblarFamilias('');
        limpiarTabla();
        preciosMem.clear();
        promosMem.clear();
        mostrarMsg('success','Enviado con éxito ✅');
        await finalizarModalEnvio('success', 'Enviado', 'Los precios fueron enviados.');
      }catch(err){
        mostrarMsg('error','No se pudo enviar (sin señal o bloqueado). Intenta de nuevo.');
        await finalizarModalEnvio('error', 'Error de envío', 'No se pudo completar el envío. Intenta de nuevo.');
      }finally{
        setControlesEnvio(false);
      }
    });
  </script>
